<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon | Vastra by Rashi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/gsap@3.12.2/dist/gsap.min.js"></script>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Playfair Display', serif;
      background: linear-gradient(135deg, #fff8f1, #fbe6d3);
    }
    .title {
      font-family: 'Great Vibes', cursive;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen px-4 text-gray-800">
  <div class="text-center max-w-xl p-6 rounded-xl shadow-xl bg-white/70 backdrop-blur-md">
    <div class="flex justify-center mb-4">
      <lottie-player 
        src="https://lottie.host/3f24bc61-8e3a-4a8c-a9db-5aa7e0bc47df/kQ4DXvhhgm.json"
        background="transparent" speed="1" style="width: 200px; height: 200px;" loop autoplay>
      </lottie-player>
    </div>
    <h1 class="text-4xl md:text-5xl title text-amber-800 mb-2">Vastra by Rashi</h1>
    <p class="italic text-lg mb-2">Every Thread Tells Your Story...</p>
    <h2 class="text-xl font-medium mb-6 text-gray-700">Our store is getting dressed up for you!</h2>

    <!-- Email form -->
    <form class="flex flex-col sm:flex-row gap-2 justify-center mb-6">
      <input type="email" placeholder="Your email address" class="px-4 py-2 rounded-full border border-gray-300 w-full sm:w-64" required />
      <button class="bg-amber-800 text-white px-6 py-2 rounded-full hover:bg-amber-700 transition">Notify Me</button>
    </form>

    <!-- Contact -->
    <div class="text-sm text-gray-600 mb-2">
      Contact: <strong>Raghottam V Kalkeri</strong>  
      <br>📞 87926 78598
    </div>

    <!-- Social Links -->
    <div class="mt-4 flex justify-center gap-4 text-amber-800 font-semibold text-sm">
      <a href="#" class="hover:underline">Instagram</a>
      <a href="#" class="hover:underline">Facebook</a>
    </div>
  </div>

  <script>
    gsap.from("h1", { duration: 1, y: -50, opacity: 0, ease: "power2.out" });
    gsap.from("form", { duration: 1.2, y: 30, opacity: 0, delay: 0.5 });
    gsap.from(".text-sm", { duration: 1, opacity: 0, delay: 1 });
  </script>
</body>
</html>
